global
    log stdout format raw local0
    maxconn 4096

defaults
    log global
    mode http
    timeout connect 5000ms
    timeout client  50000ms
    timeout server  50000ms

frontend http_front
    bind *:4545
    default_backend http_back

backend http_back
    balance roundrobin
    server ai-sim-01 ai-sim-01:4545 check
    server ai-sim-02 ai-sim-02:4545 check
    server ai-sim-03 ai-sim-03:4545 check
